<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1400">
<title>MC - Neon Tribe</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .cover {
    width: 1400px; height: 1400px;
    background: #0a0a0a;
    position: relative;
    overflow: hidden;
    font-family: 'Bebas Neue', sans-serif;
  }

  /* Subtle grid */
  .subtle-grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(0,255,136,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.015) 1px, transparent 1px);
    background-size: 70px 70px;
  }

  /* Main SVG */
  .main-svg {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
  }

  /* Neon glow classes */
  .neon-green {
    fill: none;
    stroke: #00ff88;
    filter: drop-shadow(0 0 4px #00ff88) drop-shadow(0 0 8px rgba(0,255,136,0.5)) drop-shadow(0 0 16px rgba(0,255,136,0.3));
  }
  .neon-cyan {
    fill: none;
    stroke: #00ccff;
    filter: drop-shadow(0 0 4px #00ccff) drop-shadow(0 0 8px rgba(0,204,255,0.5)) drop-shadow(0 0 16px rgba(0,204,255,0.3));
  }
  .dim-green {
    fill: none;
    stroke: rgba(0,255,136,0.12);
  }
  .dim-cyan {
    fill: none;
    stroke: rgba(0,204,255,0.12);
  }

  .fill-green {
    fill: #00ff88;
    filter: drop-shadow(0 0 3px #00ff88);
  }
  .fill-cyan {
    fill: #00ccff;
    filter: drop-shadow(0 0 3px #00ccff);
  }

  /* MC mega text with tribal pattern inside */
  .mc-mega {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -55%);
    z-index: 10;
  }

  .mc-mega svg {
    width: 1100px;
    height: 500px;
  }

  /* Artist name */
  .artist-name {
    position: absolute;
    bottom: 220px; left: 50%;
    transform: translateX(-50%);
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 24px;
    letter-spacing: 20px;
    color: rgba(0,255,136,0.5);
    text-transform: uppercase;
    z-index: 10;
  }

  /* Genre tag */
  .genre-tag {
    position: absolute;
    bottom: 160px; left: 50%;
    transform: translateX(-50%);
    font-family: 'Orbitron', monospace;
    font-weight: 400;
    font-size: 14px;
    letter-spacing: 10px;
    color: rgba(0,204,255,0.35);
    text-transform: uppercase;
    z-index: 10;
  }

  /* Album name */
  .album-name {
    position: absolute;
    top: 120px; left: 50%;
    transform: translateX(-50%);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 50px;
    letter-spacing: 15px;
    color: #00ff88;
    text-shadow: 0 0 15px rgba(0,255,136,0.6), 0 0 30px rgba(0,255,136,0.3);
    z-index: 10;
  }

  /* Bottom line accent */
  .bottom-line {
    position: absolute;
    bottom: 280px;
    left: 300px; right: 300px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0,255,136,0.3), rgba(0,204,255,0.3), transparent);
    z-index: 10;
  }

  /* Top decorative line */
  .top-line {
    position: absolute;
    top: 200px;
    left: 200px; right: 200px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0,204,255,0.2), transparent);
    z-index: 10;
  }

  /* Vignette */
  .vignette {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, transparent 35%, rgba(0,0,0,0.7) 100%);
    z-index: 15;
    pointer-events: none;
  }

  /* Corner brackets */
  .bracket {
    position: absolute;
    width: 50px; height: 50px;
    z-index: 10;
  }
  .bracket.tl { top: 50px; left: 50px; border-top: 2px solid rgba(0,255,136,0.3); border-left: 2px solid rgba(0,255,136,0.3); }
  .bracket.tr { top: 50px; right: 50px; border-top: 2px solid rgba(0,255,136,0.3); border-right: 2px solid rgba(0,255,136,0.3); }
  .bracket.bl { bottom: 50px; left: 50px; border-bottom: 2px solid rgba(0,204,255,0.3); border-left: 2px solid rgba(0,204,255,0.3); }
  .bracket.br { bottom: 50px; right: 50px; border-bottom: 2px solid rgba(0,204,255,0.3); border-right: 2px solid rgba(0,204,255,0.3); }

  /* Pulse animation for the MC glow */
  @keyframes neon-pulse {
    0%, 100% { filter: drop-shadow(0 0 8px #00ff88) drop-shadow(0 0 20px rgba(0,255,136,0.6)) drop-shadow(0 0 40px rgba(0,255,136,0.3)); }
    50% { filter: drop-shadow(0 0 12px #00ff88) drop-shadow(0 0 30px rgba(0,255,136,0.8)) drop-shadow(0 0 60px rgba(0,255,136,0.4)); }
  }
  .neon-animated {
    animation: neon-pulse 3s ease-in-out infinite;
  }
</style>
</head>
<body>
<div class="cover">
  <div class="subtle-grid"></div>

  <!-- Background tribal pattern elements -->
  <svg class="main-svg" viewBox="0 0 1400 1400">
    <!-- Scattered tribal geometric shapes in background -->
    <!-- Top-left tribal cluster -->
    <polygon class="dim-green" points="100,300 130,260 160,300" stroke-width="1"/>
    <polygon class="dim-green" points="120,310 150,270 180,310" stroke-width="1"/>
    <line class="dim-cyan" x1="80" y1="340" x2="200" y2="340" stroke-width="1"/>
    <circle cx="140" cy="250" r="2" fill="rgba(0,255,136,0.15)"/>

    <!-- Top-right tribal cluster -->
    <polygon class="dim-cyan" points="1240,280 1270,240 1300,280" stroke-width="1"/>
    <polygon class="dim-cyan" points="1260,290 1290,250 1320,290" stroke-width="1"/>
    <line class="dim-green" x1="1220" y1="320" x2="1340" y2="320" stroke-width="1"/>

    <!-- Bottom-left tribal cluster -->
    <polygon class="dim-cyan" points="150,1100 180,1060 210,1100" stroke-width="1"/>
    <line class="dim-green" x1="130" y1="1120" x2="230" y2="1120" stroke-width="1"/>
    <line class="dim-green" x1="130" y1="1130" x2="230" y2="1130" stroke-width="1"/>

    <!-- Bottom-right tribal cluster -->
    <polygon class="dim-green" points="1200,1080 1230,1040 1260,1080" stroke-width="1"/>
    <line class="dim-cyan" x1="1180" y1="1100" x2="1280" y2="1100" stroke-width="1"/>

    <!-- Zigzag accents -->
    <polyline class="dim-green" points="50,500 70,480 90,500 110,480 130,500" stroke-width="1"/>
    <polyline class="dim-cyan" points="1270,900 1290,880 1310,900 1330,880 1350,900" stroke-width="1"/>

    <!-- Dot patterns scattered -->
    <circle cx="300" cy="200" r="2" fill="rgba(0,255,136,0.1)"/>
    <circle cx="320" cy="200" r="2" fill="rgba(0,255,136,0.1)"/>
    <circle cx="340" cy="200" r="2" fill="rgba(0,255,136,0.1)"/>
    <circle cx="1060" cy="200" r="2" fill="rgba(0,204,255,0.1)"/>
    <circle cx="1080" cy="200" r="2" fill="rgba(0,204,255,0.1)"/>
    <circle cx="1100" cy="200" r="2" fill="rgba(0,204,255,0.1)"/>
    <circle cx="300" cy="1200" r="2" fill="rgba(0,204,255,0.1)"/>
    <circle cx="320" cy="1200" r="2" fill="rgba(0,204,255,0.1)"/>
    <circle cx="340" cy="1200" r="2" fill="rgba(0,204,255,0.1)"/>
    <circle cx="1060" cy="1200" r="2" fill="rgba(0,255,136,0.1)"/>
    <circle cx="1080" cy="1200" r="2" fill="rgba(0,255,136,0.1)"/>
    <circle cx="1100" cy="1200" r="2" fill="rgba(0,255,136,0.1)"/>
  </svg>

  <!-- MC Mega monogram with tribal pattern fill -->
  <div class="mc-mega">
    <svg viewBox="0 0 1100 500" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- Tribal pattern for filling the letters -->
        <pattern id="tribalFill" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
          <!-- Triangle up -->
          <polygon points="20,5 35,30 5,30" fill="none" stroke="#00ff88" stroke-width="1" opacity="0.6"/>
          <!-- Small dot -->
          <circle cx="20" cy="20" r="1.5" fill="#00ccff" opacity="0.5"/>
          <!-- Zigzag line -->
          <polyline points="0,38 10,32 20,38 30,32 40,38" fill="none" stroke="#00ccff" stroke-width="0.8" opacity="0.4"/>
          <!-- Small diamond -->
          <polygon points="20,0 25,5 20,10 15,5" fill="none" stroke="#00ff88" stroke-width="0.6" opacity="0.3"/>
        </pattern>

        <!-- Clip path for MC text -->
        <clipPath id="mcClip">
          <text x="550" y="400" text-anchor="middle" font-family="'Orbitron', monospace" font-weight="900" font-size="420" letter-spacing="40">MC</text>
        </clipPath>

        <!-- Glow filter -->
        <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>

      <!-- Background glow of the letters -->
      <text x="550" y="400" text-anchor="middle" font-family="'Orbitron', monospace" font-weight="900" font-size="420" letter-spacing="40"
            fill="none" stroke="#00ff88" stroke-width="1" opacity="0.3"
            filter="url(#neonGlow)">MC</text>

      <!-- Tribal pattern inside the letters -->
      <g clip-path="url(#mcClip)">
        <rect x="0" y="0" width="1100" height="500" fill="url(#tribalFill)"/>
        <!-- Additional tribal elements inside -->
        <line x1="0" y1="100" x2="1100" y2="100" stroke="rgba(0,255,136,0.1)" stroke-width="1"/>
        <line x1="0" y1="200" x2="1100" y2="200" stroke="rgba(0,204,255,0.08)" stroke-width="1"/>
        <line x1="0" y1="300" x2="1100" y2="300" stroke="rgba(0,255,136,0.1)" stroke-width="1"/>
        <line x1="0" y1="400" x2="1100" y2="400" stroke="rgba(0,204,255,0.08)" stroke-width="1"/>
      </g>

      <!-- Letter outlines with neon glow -->
      <text x="550" y="400" text-anchor="middle" font-family="'Orbitron', monospace" font-weight="900" font-size="420" letter-spacing="40"
            fill="none" stroke="#00ff88" stroke-width="2.5"
            style="filter: drop-shadow(0 0 8px #00ff88) drop-shadow(0 0 20px rgba(0,255,136,0.5)) drop-shadow(0 0 40px rgba(0,255,136,0.25));">MC</text>

      <!-- Inner stroke in cyan -->
      <text x="550" y="400" text-anchor="middle" font-family="'Orbitron', monospace" font-weight="900" font-size="420" letter-spacing="40"
            fill="none" stroke="#00ccff" stroke-width="0.5" opacity="0.5">MC</text>
    </svg>
  </div>

  <div class="top-line"></div>
  <div class="bottom-line"></div>

  <div class="bracket tl"></div>
  <div class="bracket tr"></div>
  <div class="bracket bl"></div>
  <div class="bracket br"></div>

  <div class="album-name">NEON TRIBE</div>
  <div class="artist-name">MATHEUS CASTRO</div>
  <div class="genre-tag">ELECTRONIC TRIBAL CIRCUIT</div>

  <div class="vignette"></div>
</div>
</body>
</html>
