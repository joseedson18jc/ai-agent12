<!DOCTYPE html>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .cover {
    width: 1400px; height: 1400px;
    background: linear-gradient(180deg, #0a0a0a 0%, #0d0520 50%, #0a0a0a 100%);
    position: relative;
    overflow: hidden;
    font-family: 'Bebas Neue', sans-serif;
  }

  /* Waveform SVG */
  .waveform-svg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }

  /* Bar styling */
  .bar {
    fill: url(#barGradient);
    opacity: 0.9;
  }
  .bar-glow {
    fill: url(#barGradient);
    opacity: 0.25;
    filter: blur(6px);
  }

  /* Tribal border patterns */
  .tribal-border {
    fill: none;
    stroke: rgba(124,58,237,0.4);
    stroke-width: 1.5;
  }
  .tribal-border-bright {
    fill: none;
    stroke: #a855f7;
    stroke-width: 1.5;
    filter: drop-shadow(0 0 4px rgba(168,85,247,0.5));
  }
  .tribal-dot {
    fill: #c084fc;
    filter: drop-shadow(0 0 3px rgba(192,132,252,0.6));
  }

  /* MC text */
  .mc-text {
    position: absolute;
    top: 200px; left: 50%;
    transform: translateX(-50%);
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: 220px;
    letter-spacing: 25px;
    color: #fff;
    text-shadow:
      0 0 15px rgba(124,58,237,0.6),
      0 0 40px rgba(124,58,237,0.3),
      0 0 80px rgba(168,85,247,0.2);
    z-index: 10;
  }

  /* Album title */
  .album-title {
    position: absolute;
    bottom: 200px; left: 50%;
    transform: translateX(-50%);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 60px;
    letter-spacing: 15px;
    color: #a855f7;
    text-shadow: 0 0 15px rgba(168,85,247,0.5);
    z-index: 10;
  }

  /* Genre tag */
  .genre-tag {
    position: absolute;
    bottom: 140px; left: 50%;
    transform: translateX(-50%);
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 15px;
    letter-spacing: 12px;
    color: rgba(192,132,252,0.4);
    text-transform: uppercase;
    z-index: 10;
  }

  /* Artist name */
  .artist-name {
    position: absolute;
    bottom: 80px; left: 50%;
    transform: translateX(-50%);
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 18px;
    letter-spacing: 14px;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
    z-index: 10;
  }

  /* Horizontal accent */
  .h-accent {
    position: absolute;
    left: 100px; right: 100px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(124,58,237,0.3), transparent);
  }
  .h-accent.top { top: 320px; }
  .h-accent.bottom { bottom: 320px; }

  /* Vignette */
  .vignette {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.6) 100%);
    z-index: 5;
    pointer-events: none;
  }

  /* Subtle glow behind waveform */
  .center-glow {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 1000px; height: 400px;
    background: radial-gradient(ellipse, rgba(124,58,237,0.1) 0%, transparent 70%);
    z-index: 0;
  }
