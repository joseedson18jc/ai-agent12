# ============================================================
# ÓticaGestão — Render.com Blueprint
# Deploy com um clique: Web Service + PostgreSQL
# ============================================================

databases:
  - name: otica-gestao-db
    plan: free
    databaseName: otica_gestao
    user: otica_user

services:
  - type: web
    plan: free
    name: otica-gestao
    runtime: node
    buildCommand: |
      npm ci &&
      npm run build &&
      cd backend &&
      npm ci --include=dev &&
      npx prisma generate &&
      npm run build &&
      mkdir -p public &&
      cp -r ../dist/* public/
    startCommand: cd backend && npx prisma migrate deploy && (npx tsx prisma/seed.ts || true) && node dist/index.js
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: otica-gestao-db
          property: connectionString
